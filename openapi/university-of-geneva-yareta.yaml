            - RESUBMITTING => A package re-submission is in progress

            - STORED => Package stored on storage location

            - TOMBSTONE_REPLICATION_PENDING => A tombstone replication is pending

            - UPDATING_COMPLIANCE_LEVEL => A package compliance update is in progress

            - UPDATING_RETENTION => A package retention update is in progress during disposal process

            - UPGRADING_METADATA => A metadata version upgrade is in progress

            '
          enum:
          - CHECK_PENDING
          - CHECKING
          - CHECKED
          - CLEANING
          - CLEANED
          - COMPLETED
          - DOWNLOADING
          - IN_PREPARATION
          - IN_PROGRESS
          - STORED
          - INDEXING
          - READY
          - RETRIEVING
          - RETRIEVING_PENDING
          - IN_ERROR
          - PRESERVATION_ERROR
          - FIXITY_ERROR
          - DISPOSABLE
          - DISPOSAL_APPROVED_BY_ORGUNIT
          - DISPOSAL_APPROVED
          - DISPOSED
          - FIX_PENDING
          - FIXING
          - METADATA_EDITION_PENDING
          - EDITING_METADATA
          - UPDATING_RETENTION
          - METADATA_UPGRADE_PENDING
          - UPGRADING_METADATA
          - COMPLIANCE_LEVEL_UPDATE_PENDING
          - UPDATING_COMPLIANCE_LEVEL
          - COMPLIANCE_LEVEL_UPDATED
          - REINDEXING
          - RELOADED
          - RESUBMITTING
          - PACKAGE_REPLICATION_PENDING
          - REPLICATING_PACKAGE
          - TOMBSTONE_REPLICATION_PENDING
          - REPLICATING_TOMBSTONE
          writeOnly: true
        smartRetention:
          type: string
          description: The retention duration in human-readable format of the package.
          readOnly: true
        _links:
          $ref: '#/components/schemas/Links'
