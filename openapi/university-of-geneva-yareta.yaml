    Deposit:
      type: object
      description: 'A deposit is a simple package to prepare a SIP.

        Deposit status:

        - APPROVED => Approved deposit. The SIP preparation is in progress.

        - CANCEL_EDITING_METADATA => A cancellation of metadata edition is in progress.

        - CHECKED => Checked deposit. The deposit is ready for SIP preparation.

        - CHECKING_COMPLIANCE => A compliance check is in progress for completed deposits.

        - CHECKING_COMPLIANCE_CLEANED => A compliance check is in progress for cleaned deposits.

        - CLEANED => Cleaned deposit: the data file are purged based on submission policy.

        - CLEANING => A clean process is in progress.

        - COMPLETED => Completed deposit. The preparation of SIP is completed.

        - COMPLIANCE_ERROR => An error occurred during a compliance check.

        - DELETING => A deletion process is in progress.

        - EDITING_METADATA_REJECTED => The metadata edition was rejected.

        - EDITING_METADATA => The deposit is in edition mode for metadata.

        - IN_ERROR => An error occurred during the SIP preparation.

        - IN_PROGRESS => The deposit is in progress, ready for adding data files.

        - IN_VALIDATION => The deposit is waiting for an approval.

        - REJECTED => The deposit was rejected.

        - RELOADING => The deposit is a reload process.

        - SUBMITTED => Submitted deposit. The SIP preparation is in progress.

        - UPGRADING_METADATA => The deposit is in upgrade mode of metadata version.

        '
      properties:
        creation:
          $ref: '#/components/schemas/ChangeInfo'
        lastUpdate:
          $ref: '#/components/schemas/ChangeInfo'
        resId:
          type: string
          description: The identifier of the resource. The default format is a Universally Unique IDentifier (UUID).
          maxLength: 50
          minLength: 0
        searchCriterias:
          type: array
          items:
            $ref: '#/components/schemas/SearchCriteria'
        access:
          type: string
          description: The access level of the deposit.
          enum:
          - PUBLIC
          - RESTRICTED
          - CLOSED
        dataSensitivity:
          type: string
          description: The data sensitivity of the deposit.
          enum:
          - UNDEFINED
          - BLUE
          - GREEN
          - YELLOW
          - ORANGE
          - RED
          - CRIMSON
        dataUsePolicy:
          type: string
          description: The data use policy of the deposit.
          enum:
          - NONE
          - LICENSE
          - CLICK_THROUGH_DUA
          - SIGNED_DUA
          - EXTERNAL_DUA
        dataFileNumber:
          type: integer
          format: int32
          description: The number of deposit data files.
          readOnly: true
        complianceLevel:
          type: string
          description: The compliance level of the deposit.
          enum:
          - NOT_ASSESSED
          - NO_COMPLIANCE
          - WEAK_COMPLIANCE
          - AVERAGE_COMPLIANCE
          - FULL_COMPLIANCE
        collectionBegin:
          type: string
          format: date-time
          description: The start date of the deposit for collecting data.
        collectionEnd:
          type: string
          format: date-time
          description: The end date of the deposit for collecting data.
        description:
          type: string
          description: The description of the deposit.
          maxLength: 4096
          minLength: 1
        doi:
          type: string
          description: The Digital Object Identifier (DOI) of the deposit.
        ark:
          type: string
          description: The ARK Identifier of the deposit.
        embargo:
          $ref: '#/components/schemas/EmbargoInfo'
          description: The embargo of the deposit.
        keywords:
          type: array
          description: The keyword List of the deposit.
          items:
            type: string
        language:
          $ref: '#/components/schemas/Language'
          description: The language object of the deposit.
        languageId:
          type: string
          description: The language identifier of the deposit.
          maxLength: 50
