---
aid: university-of-geneva
name: University of Geneva
description: >-
  The University of Geneva (Université de Genève, UNIGE) is a public research
  university in Geneva, Switzerland, founded in 1559, and ranked #93 in the QS
  World University Rankings 2025. Its public developer and API footprint is
  centered on open science and research infrastructure operated by the Division
  of Scientific Information (DIS) and the e-Research services: the Archive
  ouverte UNIGE institutional repository exposes metadata via a live OAI-PMH
  endpoint, the Yareta research-data-management platform (built on the DLCM
  stack) offers a REST API for preservation and access, and domain research
  groups publish specialized services such as the Terminus protein-prediction
  API. UNIGE maintains a public GitHub organization (dis-unige) for library and
  data tooling. There is no single unified public developer portal; most APIs
  are research- or service-specific.
