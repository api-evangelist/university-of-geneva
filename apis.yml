    name: Terminus Protein Prediction API
    description: >-
      Terminus is a UNIGE-developed prediction service for protein N-terminal
      modifications (initial methionine cleavage and N-terminal acetylation)
      across taxonomic groups. It accepts protein sequences via HTTP POST in
      FASTA-to-CSV or JSON-to-JSON modes and returns prediction results.
